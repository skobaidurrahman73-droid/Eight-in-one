<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Apps | Digital Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --ad-bg: rgba(15, 23, 42, 0.8);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light-mode {
            --bg-color: #f1f5f9;
            --container-bg: rgba(255, 255, 255, 0.9);
            --accent-color: #0284c7;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --ad-bg: rgba(226, 232, 240, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: 0.5s var(--ease);
        }

        /* --- Floating/Top Navigation Button --- */
        .nav-header {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .main-go-btn {
            display: block;
            width: 100%;
            background: var(--accent-color);
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
            transition: 0.3s;
        }

        .main-go-btn:hover {
            transform: translateY(-3px);
            background: #0ea5e9;
        }

        /* --- Ad Styling --- */
        .ad-section {
            width: 100%;
            max-width: 720px;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .ad-unit {
            width: 100%;
            height: 1080px;
            background: var(--ad-bg);
            border: 2px dashed var(--text-secondary);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .ad-unit::before {
            content: "SPONSORED ADVERTISEMENT";
            position: absolute;
            top: 0; width: 100%;
            background: var(--text-secondary);
            color: var(--bg-color);
            font-size: 10px; font-weight: 800; text-align: center;
            padding: 5px; z-index: 5;
        }

        .ad-unit iframe { width: 100%; height: 100%; border: none; padding-top: 25px; }

        /* --- Main App Container --- */
        .main-container {
            width: 100%;
            max-width: 500px;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            padding: 50px 30px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            text-align: center;
            margin: 40px 0;
        }

        .top-controls { position: absolute; top: 25px; right: 25px; display: flex; gap: 10px; }
        .control-btn {
            background: rgba(255,255,255,0.05); color: var(--accent-color);
            border: 1px solid rgba(255,255,255,0.1);
            width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
        }

        .logo { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent-color); margin-bottom: 20px; object-fit: cover; }
        h1 { font-size: 38px; font-weight: 800; color: var(--accent-color); margin-bottom: 5px; }
        .tagline { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 40px; }

        .links-grid { display: flex; flex-direction: column; gap: 15px; }
        .link-card {
            display: flex; align-items: center; background: rgba(255,255,255,0.03);
            padding: 18px 25px; border-radius: 20px; text-decoration: none;
            color: var(--text-primary); font-weight: 600; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .link-card i { font-size: 24px; margin-right: 20px; color: var(--accent-color); }
        .link-card:hover { background: var(--accent-color); color: white; transform: translateY(-3px); }

        .footer { margin-top: 40px; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); }
        .admin-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--accent-color); margin-bottom: 10px; }
        .admin-name { display: block; font-weight: 700; color: var(--accent-color); }

        @media (max-width: 768px) { .ad-unit { height: 600px; } }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="#main-content" class="main-go-btn"><i class="fas fa-arrow-down"></i> GO TO PRO APPS</a>
    </div>

    <div class="ad-section">
        <div class="ad-unit"><iframe src="https://omg10.com/4/10451491"></iframe></div>
        <div class="ad-unit"><iframe src="https://omg10.com/4/10714156"></iframe></div>
    </div>

    <div class="main-container" id="main-content">
        <div class="top-controls">
            <button class="control-btn" onclick="toggleTheme()"><i id="t-icon" class="fas fa-moon"></i></button>
            <button class="control-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
        </div>

        <header>
            <img src="cyber-hacker-anonymous-logo-vector-50369664.jpg" alt="Logo" class="logo">
            <h1>Pro Apps</h1>
            <p class="tagline">Digital Ecosystem</p>
        </header>

        <nav class="links-grid">
            <a href="https://youtube.com/@skobaidurrahman1" target="_blank" class="link-card"><i class="fab fa-youtube"></i> YouTube</a>
            <a href="https://t.me/proappslinkbd" target="_blank" class="link-card"><i class="fab fa-telegram"></i> Telegram</a>
            <a href="https://skobaidurrahman73-droid.github.io/File-transfer-via-link/" target="_blank" class="link-card"><i class="fas fa-share-nodes"></i> Link Share</a>
            <a href="https://skobaidurrahman73-droid.github.io/Video-Downloader/#" target="_blank" class="link-card"><i class="fas fa-clover"></i> Video Downloader</a>
            <a href="https://skobaidurrahman73-droid.github.io/Largest-to-smallest-links/" target="_blank" class="link-card"><i class="fas fa-link"></i> Link Shortener</a>
            <a href="https://skobaidurrahman73-droid.github.io/Largest-to-smallest-links/" target="_blank" class="link-card"><i class="fas fa-rocket"></i> Link Booster</a>
            <a href="https://skobaidurrahman73-droid.github.io/Wi-Fi-Preet-Metre-/" target="_blank" class="link-card"><i class="fas fa-wifi"></i> Speed Meter</a>
            <a href="https://skobaidurrahman73-droid.github.io/Phone-info/" target="_blank" class="link-card"><i class="fas fa-microchip"></i> Device Status</a>
        </nav>

        <footer class="footer">
            <img src="1766747045788.jpg" alt="Admin" class="admin-img">
            <span class="admin-name">Obaydur Rahman</span>
        </footer>
    </div>

    <div class="ad-section">
        <div class="ad-unit"><iframe src="https://omg10.com/4/10451492"></iframe></div>
        <div class="ad-unit"><iframe src="https://omg10.com/4/10714152"></iframe></div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('t-icon');
            const isLight = document.body.classList.contains('light-mode');
            icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }
        if(localStorage.getItem('theme') === 'light') toggleTheme();
    </script>
</body>
</html>
