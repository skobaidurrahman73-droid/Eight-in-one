<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Apps | Elite Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.95);
            --accent: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --neon: #00f2fe;
            --text: #f9fafb;
            --muted: #9ca3af;
            --border: rgba(0, 242, 254, 0.2);
            --glass: rgba(255, 255, 255, 0.05);
        }

        .light-mode {
            --bg: #f3f4f6;
            --panel: rgba(255, 255, 255, 0.98);
            --accent: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%);
            --neon: #0ea5e9;
            --text: #111827;
            --muted: #6b7280;
            --border: rgba(14, 165, 233, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.4s; display: flex; flex-direction: column; align-items: center; padding: 120px 15px; }

        /* Status Info */
        .info-bar { position: fixed; top: 20px; left: 20px; z-index: 1000; background: var(--panel); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border); font-family: 'Montserrat'; font-size: 11px; font-weight: 700; color: var(--neon); letter-spacing: 0.5px; }

        /* Top Nav */
        .nav-wrap { width: 100%; max-width: 650px; position: fixed; top: 15px; z-index: 1000; padding: 0 10px; }
        .nav-btn { display: flex; align-items: center; justify-content: center; background: var(--accent); color: #fff; padding: 15px; border-radius: 18px; text-decoration: none; font-family: 'Montserrat'; font-weight: 800; font-size: 13px; box-shadow: 0 10px 25px rgba(0, 242, 254, 0.25); text-transform: uppercase; letter-spacing: 1px; }

        /* Ad Units (720x1080) */
        .ad-container { width: 100%; max-width: 720px; margin-bottom: 70px; }
        .ad-frame { width: 100%; height: 1080px; background: var(--panel); border: 1px solid var(--border); border-radius: 35px; overflow: hidden; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        .ad-label { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: var(--neon); color: #000; font-size: 10px; font-weight: 800; padding: 5px 20px; border-radius: 0 0 12px 12px; z-index: 5; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Main Panel */
        .main-card { width: 100%; max-width: 650px; background: var(--panel); backdrop-filter: blur(30px); border: 1px solid var(--border); border-radius: 50px; padding: 100px 40px 80px; position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.5); margin-bottom: 80px; }
        
        /* Fixed Controls Position */
        .controls { position: absolute; top: 25px; right: 25px; display: flex; gap: 12px; z-index: 10; }
        .ctrl-icon { background: var(--glass); color: var(--neon); border: 1px solid var(--border); width: 45px; height: 45px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .ctrl-icon:hover { background: var(--neon); color: #000; transform: translateY(-3px); }

        /* Branding */
        header { margin-bottom: 50px; text-align: center; margin-top: 20px; }
        .logo-wrap { width: 120px; height: 120px; border-radius: 35px; background: #fff; padding: 5px; box-shadow: 0 20px 40px rgba(0, 242, 254, 0.2); margin: 0 auto 25px; position: relative; }
        .logo-wrap img { width: 100%; height: 100%; border-radius: 30px; object-fit: cover; }
        h1 { font-family: 'Montserrat'; font-size: 36px; font-weight: 800; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        .v-badge { font-size: 11px; color: #10b981; font-weight: 700; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; text-transform: uppercase; border: 1px solid rgba(16, 185, 129, 0.2); padding: 5px 15px; border-radius: 20px; }

        /* Search */
        .search-wrap { margin-bottom: 35px; }
        #search { width: 100%; padding: 16px 22px; border-radius: 20px; border: 1px solid var(--border); background: var(--glass); color: #fff; font-size: 14px; outline: none; }
        #search:focus { border-color: var(--neon); }

        /* App List */
        .app-grid { display: flex; flex-direction: column; gap: 16px; }
        .app-item { display: flex; align-items: center; padding: 22px 30px; background: var(--glass); border-radius: 25px; text-decoration: none; color: var(--text); border: 1px solid var(--border); transition: 0.3s; gap: 20px; }
        .app-item i { font-size: 24px; color: var(--neon); }
        .app-item span { font-weight: 700; font-size: 16px; font-family: 'Montserrat'; }
        .app-item:hover { transform: translateX(10px); background: rgba(0, 242, 254, 0.08); border-color: var(--neon); }

        /* Admin Signature */
        .admin-footer { margin-top: 70px; padding-top: 40px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 20px; }
        .admin-img { width: 85px; height: 85px; border-radius: 25px; border: 3px solid var(--neon); padding: 4px; flex-shrink: 0; }
        .admin-img img { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; }
        .admin-data { text-align: left; }
        .tag { background: var(--neon); color: #000; font-size: 9px; font-weight: 800; padding: 3px 12px; border-radius: 6px; text-transform: uppercase; }
        .name { display: block; font-family: 'Montserrat'; font-size: 20px; font-weight: 800; color: var(--text); margin-top: 5px; white-space: nowrap; }

        /* Back to top */
        .btt { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: var(--accent); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 100; }
        .btt.active { opacity: 1; visibility: visible; }

        @media (max-width: 768px) {
            h1 { font-size: 28px; }
            .main-card { padding: 90px 25px 60px; border-radius: 40px; }
            .ad-frame { height: 700px; }
            .name { font-size: 18px; }
            .info-bar { display: none; }
            .controls { top: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const i = document.getElementById('ti');
            const isL = document.body.classList.contains('light-mode');
            i.className = isL ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isL ? 'light' : 'dark');
        }
        if(localStorage.getItem('theme') === 'light') toggleTheme();

        function filter() {
            let v = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.app-item').forEach(i => {
                i.style.display = i.innerText.toLowerCase().includes(v) ? 'flex' : 'none';
            });
        }

        window.onscroll = function() {
            let b = document.getElementById('b');
            b.classList.toggle('active', window.scrollY > 400);
        };
    </script>
