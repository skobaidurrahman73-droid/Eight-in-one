<head>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(13, 17, 23, 0.8);
            --accent: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --neon: #00f2fe;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(0, 242, 254, 0.2);
            --card-hover: rgba(0, 242, 254, 0.1);
        }

        .light-mode {
            --bg: #f0f2f5;
            --panel: rgba(255, 255, 255, 0.9);
            --accent: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
            --neon: #2193b0;
            --text: #1a1a1b;
            --text-dim: #4b5563;
            --border: rgba(33, 147, 176, 0.3);
            --card-hover: rgba(33, 147, 176, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.5s; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* Floating Nav */
        .nav-sticky { width: 100%; max-width: 550px; position: sticky; top: 15px; z-index: 1000; margin-bottom: 40px; }
        .main-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--accent); color: #fff; padding: 18px; border-radius: 20px; text-decoration: none; font-family: 'Montserrat'; font-weight: 900; box-shadow: 0 10px 30px rgba(0, 242, 254, 0.3); transition: 0.3s; text-transform: uppercase; }
        .main-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* Ads */
        .ad-container { width: 100%; max-width: 720px; margin-bottom: 30px; }
        .ad-box { width: 100%; height: 1080px; background: var(--panel); border: 2px solid var(--border); border-radius: 30px; overflow: hidden; position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .ad-label { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: var(--neon); color: #000; font-size: 10px; font-weight: 900; padding: 5px 15px; border-radius: 0 0 12px 12px; z-index: 5; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Glass Panel */
        .glass-panel { width: 100%; max-width: 550px; background: var(--panel); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 50px; padding: 60px 35px; text-align: center; position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.4); }
        
        .top-controls { position: absolute; top: 35px; right: 35px; display: flex; gap: 12px; }
        .t-btn { background: var(--border); color: var(--neon); border: none; width: 45px; height: 45px; border-radius: 15px; cursor: pointer; transition: 0.3s; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .t-btn:hover { background: var(--neon); color: #000; transform: rotate(20deg); }

        /* Header Centralized */
        header { margin-bottom: 50px; display: flex; flex-direction: column; align-items: center; }
        .logo-wrap { width: 120px; height: 120px; border-radius: 35px; background: #fff; padding: 4px; box-shadow: 0 20px 40px rgba(0, 242, 254, 0.2); margin-bottom: 25px; }
        .logo-wrap img { width: 100%; height: 100%; border-radius: 31px; object-fit: cover; }
        h1 { font-family: 'Montserrat'; font-size: 45px; font-weight: 900; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; line-height: 1; }
        .verify-text { font-size: 12px; color: #00ff88; font-weight: 700; margin-top: 10px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; }

        /* App Items */
        .app-grid { display: grid; gap: 15px; }
        .app-card { display: flex; align-items: center; padding: 22px 28px; background: rgba(255,255,255,0.03); border-radius: 25px; text-decoration: none; color: var(--text); border: 1px solid var(--border); transition: 0.4s; gap: 20px; }
        .app-card i { font-size: 28px; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        .app-card span { font-weight: 700; font-size: 17px; }
        .app-card:hover { transform: translateX(10px); background: var(--card-hover); border-color: var(--neon); box-shadow: -5px 0 20px var(--border); }

        /* Admin Layout - Single Line Admin Name */
        .footer-admin { margin-top: 60px; padding-top: 35px; border-top: 2px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; }
        .admin-img { width: 80px; height: 80px; border-radius: 25px; border: 3px solid var(--neon); flex-shrink: 0; }
        .admin-data { text-align: left; white-space: nowrap; overflow: hidden; }
        .tag-admin { background: var(--neon); color: #000; font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 5px; text-transform: uppercase; }
        .name-admin { display: block; font-family: 'Montserrat'; font-size: 20px; font-weight: 900; color: var(--text); margin-top: 2px; }

        @media (max-width: 768px) { 
            .ad-box { height: 600px; } 
            h1 { font-size: 35px; } 
            .name-admin { font-size: 16px; }
        }
    </style>
</head>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            const isLight = document.body.classList.contains('light-mode');
            icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('pro_theme', isLight ? 'light' : 'dark');
        }
        window.onload = () => {
            if(localStorage.getItem('pro_theme') === 'light') toggleTheme();
        }
